<!DOCTYPE html>
<html>
<head>
    <title>Music Cover Generator</title>
</head>
<body>

<h1>Upload MP3</h1>

<input type="file" id="file">
<button onclick="uploadFile()">Upload</button>

<br><br>

<button onclick="regenerate()">Regenerate</button>

<br><br>

<img id="cover" style="width:300px;">
<br><br>

<a id="download" download>Download MP3</a>

<script>
let lastFile = null;

async function uploadFile() {
    const fileInput = document.getElementById("file");
    const file = fileInput.files[0];

    if (!file) {
        alert("Select a file");
        return;
    }

    lastFile = file;

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("cover").src = data.cover_url + "?t=" + Date.now();
    document.getElementById("download").href = data.mp3_url;
}

async function regenerate() {
    if (!lastFile) {
        alert("Upload first");
        return;
    }

    uploadFile();
}
</script>

</body>
</html>
