<!doctype html>
<html>
<head>
  <title>TRACKLAB AI — Upload</title>
  <style>
    body { background:#000; color:#d4af37; font-family:'Cormorant Garamond', serif;
           max-width:600px; margin:40px auto; padding:20px; }
    h1 { letter-spacing:2px; }
    label { display:block; margin-top:14px; font-size:14px; }
    input, select { width:100%; padding:10px; margin-top:4px;
                    background:#111; color:#d4af37; border:1px solid #d4af37; }
    button { margin-top:24px; padding:12px 24px; background:#d4af37;
             color:#000; border:none; cursor:pointer; font-weight:bold; letter-spacing:1px; }
    button:hover { background:#fff; }
  </style>
</head>
<body>
  <h1>👑 TRACKLAB AI</h1>
  <p>Upload an MP3 — get back a store-ready file with AI cover art and embedded metadata.</p>

  <form action="/upload" method="post" enctype="multipart/form-data">
    <label>Title
      <input type="text" name="title" required placeholder="e.g. GAVE IT TO YOU">
    </label>
    <label>Artist
      <input type="text" name="artist" value="BAZRAGOD" required>
    </label>
    <label>Genre
      <input type="text" name="genre" value="Dancehall" required>
    </label>
    <label>Year
      <input type="number" name="year" value="2026" required>
    </label>
    <label>MP3 File
      <input type="file" name="file" accept="audio/mpeg,audio/mp3" required>
    </label>
    <button type="submit">Generate Package</button>
  </form>
</body>
</html>
